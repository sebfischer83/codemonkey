[params.page]
    fraction = true
    ruby = true
    fontawesome = true
    linkToMarkdown = true
    rssFullText = false

[params.summary.tags]
    theme = "image"
    color = "white"
    background = "black"
    transparency = 0.9

[params.cookieconsent]
    enable = true
[params.cookieconsent.content]
    message = "sdfsdf"
    dismiss = "gffgh"
    link = "dfdfgdfg"

[author]
  name = "sf.en"

[params.page.math]
    enable = true
    # default block delimiter is $$ ... $$ and \\[ ... \\]
    blockLeftDelimiter = ""
    blockRightDelimiter = ""
    # default inline delimiter is $ ... $ and \\( ... \\)
    inlineLeftDelimiter = ""
    inlineRightDelimiter = ""
    # KaTeX extension copy_tex
    copyTex = true
    # KaTeX extension mhchem
    mhchem = true

[params.page.share]
    enable = true
    Twitter = true
    Facebook = true
    Linkedin = false
