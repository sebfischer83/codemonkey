baseURL = "https://www.codemonkey.space/"
defaultContentLanguage = "en"
languageCode = "en"
title = "Code monkey in space"
# Change the default theme to be use when building the site with Hugo
theme = "uBlogger"

[params]
  # uBlogger theme version
  version = "1.3.X"
  mainSections = ["posts"]
  keywords = [".netcore", "software development", "datatent", "database"]
  gitRepo = "https://github.com/sebfischer83/codemonkey"
[params.header]
    desktopMode = "fixed"
    mobileMode = "auto"

[params.header.title]
    typeit = false
    # URL of the LOGO
    logo = ""
    # title name
    name = "Code monkey in space"
    # you can add extra information before the name (HTML format is supported), such as icons
    pre = ""
    # you can add extra information after the name (HTML format is supported), such as icons
    post = ""

 # Footer config
  [params.footer]
    enable = true
    custom = ''
    hugo = true
    copyright = true
    author = true
    # Site creation time
    since = 2021
    # ICP info only in China (HTML format is supported)
    icp = ""
    # license info (HTML format is supported)
    license = '<a rel="license external nofollow noopener noreffer" href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank">CC BY-NC 4.0</a>'
[params.home.profile]
    enable = true
    # Gravatar Email for preferred avatar in home page
    gravatarEmail = "sebfischer@gmx.net"
      title = ""
      # subtitle shown in home page
      subtitle = "This is My New Hugo Site"
      # whether to use typeit animation for subtitle
      typeit = false
      # whether to show social links
      social = true
      disclaimer = ""

